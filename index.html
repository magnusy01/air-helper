<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>空气管家</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --card: #151515;
    --border: #222;
    --text: #e8e8e8;
    --dim: #666;
    --good: #4ade80;
    --ok: #facc15;
    --warn: #fb923c;
    --bad: #ef4444;
    --terrible: #a855f7;
    --doom: #7f1d1d;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 0.3rem;
    color: var(--dim);
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--dim);
    opacity: 0.5;
    margin-bottom: 1.8rem;
  }

  /* ─── Input Cards ─── */
  .inputs {
    display: flex;
    gap: 0.8rem;
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.5rem;
  }

  .input-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 0.8rem;
    text-align: center;
    transition: border-color 0.3s;
  }

  .input-card:focus-within {
    border-color: #444;
  }

  .input-card label {
    display: block;
    font-size: 0.72rem;
    color: var(--dim);
    margin-bottom: 0.6rem;
    letter-spacing: 0.05em;
  }

  .input-card input {
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 2.8rem;
    font-weight: 900;
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
  }

  .input-card input::-webkit-outer-spin-button,
  .input-card input::-webkit-inner-spin-button {
    -webkit-appearance: none;
  }

  .input-card input::placeholder {
    color: #333;
    font-weight: 300;
  }

  .input-card .unit {
    font-size: 0.65rem;
    color: var(--dim);
    margin-top: 0.3rem;
  }

  /* ─── Color dot on input card ─── */
  .level-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.3rem;
    vertical-align: middle;
    transition: background 0.3s;
  }

  /* ─── Result Panel ─── */
  .result {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: border-color 0.5s;
  }

  .result.has-data {
    border-color: #333;
  }

  .result-icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
  }

  .result-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    line-height: 1.4;
  }

  .result-detail {
    font-size: 0.82rem;
    color: var(--dim);
    line-height: 1.8;
  }

  .result-detail strong {
    color: var(--text);
    font-weight: 600;
  }

  .placeholder-text {
    color: #333;
    font-size: 0.85rem;
    font-weight: 300;
  }

  /* ─── Action Tags ─── */
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 1rem;
  }

  .tag {
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    border: 1px solid;
  }

  .tag.do {
    background: rgba(74, 222, 128, 0.1);
    border-color: rgba(74, 222, 128, 0.3);
    color: var(--good);
  }

  .tag.caution {
    background: rgba(251, 146, 60, 0.1);
    border-color: rgba(251, 146, 60, 0.3);
    color: var(--warn);
  }

  .tag.dont {
    background: rgba(239, 68, 68, 0.1);
    border-color: rgba(239, 68, 68, 0.3);
    color: var(--bad);
  }

  /* ─── AQI Scale ─── */
  .scale {
    width: 100%;
    max-width: 400px;
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .scale-title {
    font-size: 0.7rem;
    color: var(--dim);
    margin-bottom: 0.6rem;
    letter-spacing: 0.05em;
  }

  .scale-bar {
    display: flex;
    border-radius: 6px;
    overflow: hidden;
    height: 8px;
    margin-bottom: 0.5rem;
  }

  .scale-bar div {
    flex: 1;
  }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--dim);
  }

  .scale-labels span {
    text-align: center;
    flex: 1;
    line-height: 1.3;
  }

  /* ─── POTS reminder ─── */
  .pots-note {
    width: 100%;
    max-width: 400px;
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: rgba(168, 85, 247, 0.05);
    border: 1px solid rgba(168, 85, 247, 0.15);
    border-radius: 10px;
    font-size: 0.72rem;
    color: #a78bfa;
    line-height: 1.6;
    display: none;
  }

</style>
</head>
<body>

<h1>🌬️ 空气管家</h1>
<p class="subtitle">输入数字，告诉你该干嘛</p>

<div class="inputs">
  <div class="input-card">
    <label><span class="level-dot" id="indoorDot"></span>室内 PM2.5</label>
    <input type="number" id="indoor" placeholder="--" inputmode="numeric" min="0" max="999">
    <div class="unit">净化器读数</div>
  </div>
  <div class="input-card">
    <label><span class="level-dot" id="outdoorDot"></span>室外 AQI</label>
    <input type="number" id="outdoor" placeholder="--" inputmode="numeric" min="0" max="999">
    <div class="unit">aqicn.org</div>
  </div>
</div>

<div class="result" id="result">
  <p class="placeholder-text">输入数字看建议</p>
</div>

<div class="pots-note" id="potsNote">
  ⚡ POTS提醒：空气污染会加重炎症反应，消耗本就不多的电量。污染天尽量减少外出和体力活动。
</div>

<div class="scale">
  <div class="scale-title">AQI 速查</div>
  <div class="scale-bar">
    <div style="background: #4ade80"></div>
    <div style="background: #facc15"></div>
    <div style="background: #fb923c"></div>
    <div style="background: #ef4444"></div>
    <div style="background: #a855f7"></div>
    <div style="background: #7f1d1d"></div>
  </div>
  <div class="scale-labels">
    <span>0-50<br>优</span>
    <span>51-100<br>良</span>
    <span>101-150<br>轻度</span>
    <span>151-200<br>中度</span>
    <span>201-300<br>重度</span>
    <span>300+<br>爆表</span>
  </div>
</div>

<script>
const indoorInput = document.getElementById('indoor');
const outdoorInput = document.getElementById('outdoor');
const resultDiv = document.getElementById('result');
const potsNote = document.getElementById('potsNote');
const indoorDot = document.getElementById('indoorDot');
const outdoorDot = document.getElementById('outdoorDot');

function getColor(val, isAQI) {
  // For indoor PM2.5: use different thresholds than AQI
  if (!isAQI) {
    if (val <= 15) return '#4ade80';
    if (val <= 35) return '#facc15';
    if (val <= 75) return '#fb923c';
    if (val <= 150) return '#ef4444';
    return '#a855f7';
  }
  // AQI
  if (val <= 50) return '#4ade80';
  if (val <= 100) return '#facc15';
  if (val <= 150) return '#fb923c';
  if (val <= 200) return '#ef4444';
  if (val <= 300) return '#a855f7';
  return '#7f1d1d';
}

function analyze() {
  const indoor = parseInt(indoorInput.value);
  const outdoor = parseInt(outdoorInput.value);

  // Update dots
  indoorDot.style.background = !isNaN(indoor) ? getColor(indoor, false) : 'transparent';
  outdoorDot.style.background = !isNaN(outdoor) ? getColor(outdoor, true) : 'transparent';

  // Need at least one value
  if (isNaN(indoor) && isNaN(outdoor)) {
    resultDiv.innerHTML = '<p class="placeholder-text">输入数字看建议</p>';
    resultDiv.classList.remove('has-data');
    potsNote.style.display = 'none';
    return;
  }

  resultDiv.classList.add('has-data');
  let icon = '';
  let title = '';
  let details = [];
  let actions = [];
  let showPots = false;

  // ─── Only outdoor ───
  if (isNaN(indoor) && !isNaN(outdoor)) {
    if (outdoor <= 50) {
      icon = '🟢';
      title = '空气很好，随便浪';
      actions = [{ text: '可以开窗', type: 'do' }, { text: '出门不用口罩', type: 'do' }];
    } else if (outdoor <= 100) {
      icon = '🟡';
      title = '空气还行';
      actions = [{ text: '可以短时开窗', type: 'do' }, { text: '出门可不戴口罩', type: 'do' }];
    } else if (outdoor <= 150) {
      icon = '🟠';
      title = '轻度污染';
      actions = [{ text: '少开窗', type: 'caution' }, { text: '出门戴口罩', type: 'caution' }];
      showPots = true;
    } else if (outdoor <= 200) {
      icon = '🔴';
      title = '中度污染，少出门';
      actions = [{ text: '别开窗', type: 'dont' }, { text: '出门必须N95', type: 'dont' }, { text: '净化器开着', type: 'caution' }];
      showPots = true;
    } else if (outdoor <= 300) {
      icon = '🟣';
      title = '重度污染，关窗待着';
      actions = [{ text: '关窗', type: 'dont' }, { text: '别出门', type: 'dont' }, { text: '净化器最大档', type: 'dont' }];
      showPots = true;
    } else {
      icon = '💀';
      title = '爆表了，别动';
      actions = [{ text: '关死窗户', type: 'dont' }, { text: '别出门', type: 'dont' }, { text: '净化器全速', type: 'dont' }];
      showPots = true;
    }
  }

  // ─── Only indoor ───
  if (!isNaN(indoor) && isNaN(outdoor)) {
    if (indoor <= 15) {
      icon = '✨';
      title = '室内空气很好';
      details.push('PM2.5 ≤ 15，净化器在干活');
    } else if (indoor <= 35) {
      icon = '👌';
      title = '室内还行';
      details.push('PM2.5 略高，净化器继续开着');
    } else if (indoor <= 75) {
      icon = '😐';
      title = '室内偏高了';
      details.push('检查窗户是否关好，净化器开大档');
      actions = [{ text: '关窗', type: 'caution' }, { text: '净化器加档', type: 'caution' }];
    } else {
      icon = '😷';
      title = '室内污染严重';
      details.push('窗户可能没关 / 刚开过窗');
      actions = [{ text: '马上关窗', type: 'dont' }, { text: '净化器最大档', type: 'dont' }];
      showPots = true;
    }
  }

  // ─── Both values ───
  if (!isNaN(indoor) && !isNaN(outdoor)) {
    // Core logic: should you open window?
    const canOpen = outdoor <= 75;
    const indoorBad = indoor > 50;
    const outdoorBad = outdoor > 150;

    if (outdoor <= 50 && indoor <= 15) {
      icon = '🌿';
      title = '内外都好，完美';
      actions = [{ text: '可以开窗', type: 'do' }, { text: '出门随意', type: 'do' }];
    } else if (outdoor <= 50 && indoor > 15) {
      icon = '🪟';
      title = '外面好，开窗换气';
      details.push(`室内 ${indoor} 偏高，外面才 ${outdoor}，开窗降一降`);
      actions = [{ text: '开窗通风', type: 'do' }];
    } else if (outdoor <= 100 && indoor <= 35) {
      icon = '👍';
      title = '都还行';
      details.push('可以短开窗换气，不着急');
      actions = [{ text: '可以短开窗', type: 'do' }, { text: '出门可不戴口罩', type: 'do' }];
    } else if (outdoor <= 100 && indoor > 35) {
      icon = '🪟';
      title = '室内偏高，可以短开窗';
      details.push(`室内 ${indoor}，外面 ${outdoor} 还行，开窗 5-10 分钟再关`);
      actions = [{ text: '短开窗换气', type: 'do' }, { text: '然后关窗开净化器', type: 'caution' }];
    } else if (outdoor > 100 && indoor <= 25) {
      icon = '🏠';
      title = '外面脏，家里干净，别开窗';
      details.push(`净化器压住了，室内只有 ${indoor}，继续关窗`);
      actions = [{ text: '别开窗', type: 'dont' }, { text: '净化器继续开', type: 'caution' }, { text: '出门戴N95', type: 'caution' }];
      showPots = outdoor > 150;
    } else if (outdoor > 100 && indoor > 25 && indoor <= 75) {
      icon = '😐';
      title = '内外都不太好';
      details.push(`室内 ${indoor} 在爬，别开窗，净化器加档`);
      actions = [{ text: '关窗', type: 'dont' }, { text: '净化器加档', type: 'caution' }, { text: '出门戴N95', type: 'dont' }];
      showPots = true;
    } else if (outdoor > 100 && indoor > 75) {
      icon = '🚨';
      title = '室内外都脏，紧急处理';
      details.push('关窗 + 净化器最大档，等数字降下来');
      actions = [{ text: '马上关窗', type: 'dont' }, { text: '净化器全速', type: 'dont' }, { text: '别出门', type: 'dont' }];
      showPots = true;
    }
  }

  // Render
  let html = `<div class="result-icon">${icon}</div>`;
  html += `<div class="result-title">${title}</div>`;

  if (details.length) {
    html += `<div class="result-detail">${details.join('<br>')}</div>`;
  }

  if (actions.length) {
    html += '<div class="actions">';
    actions.forEach(a => {
      html += `<span class="tag ${a.type}">${a.text}</span>`;
    });
    html += '</div>';
  }

  resultDiv.innerHTML = html;
  potsNote.style.display = showPots ? 'block' : 'none';
}

indoorInput.addEventListener('input', analyze);
outdoorInput.addEventListener('input', analyze);

// Auto-focus first input
indoorInput.focus();
</script>

</body>
</html>
